<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dublin Gigs</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #dcdcdc; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { color: #b71c1c; text-align: center; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; }
        .search-container { text-align: center; margin-bottom: 20px; }
        #gigSearch { padding: 12px; width: 80%; max-width: 400px; border: 2px solid #b71c1c; border-radius: 5px; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        th { background-color: #b71c1c; color: white; padding: 15px; text-align: left; position: sticky; top: 0; }
        td { padding: 12px 15px; border-bottom: 1px solid #ddd; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        tr:nth-child(odd) { background-color: #ffffff; }
        .status-available { color: #2e7d32; font-weight: bold; }
        .status-soldout { color: #b71c1c; font-weight: bold; }
        footer { text-align: center; margin-top: 30px; font-size: 0.8em; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dublin Gigs</h1>
        
        <div class="search-container">
            <input type="text" id="gigSearch" onkeyup="filterTable()" placeholder="Search for artists, venues, or genres...">
        </div>

        <table id="gigTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Artist / Act</th>
                    <th>Venue</th>
                    <th>Genre</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="gigs-body"></tbody>
        </table>
        <footer>
            <p>Data automatically updated every 24 hours. Sources: Ticketmaster, Nialler9, Castle Hotel.</p>
            <p id="update-time"></p>
        </footer>
    </div>

    <script>
        fetch('gigs.json')
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('gigs-body');
                document.getElementById('update-time').innerText = "Last checked: " + new Date().toLocaleString();
                
                // Sort by date
                data.sort((a, b) => new Date(a.date) - new Date(b.date));

                data.forEach(gig => {
                    const tr = document.createElement('tr');
                    const dateObj = new Date(gig.date);
                    const dateStr = isNaN(dateObj) ? gig.date : dateObj.toLocaleDateString('en-IE', { weekday: 'short', month: 'short', day: 'numeric' });

                    tr.innerHTML = `
                        <td>${dateStr}</td>
                        <td><strong>${gig.act}</strong></td>
                        <td>${gig.venue}</td>
                        <td>${gig.genre}</td>
                        <td class="${gig.status === 'Available' ? 'status-available' : 'status-soldout'}">${gig.status}</td>
                    `;
                    tbody.appendChild(tr);
                });
            });

        function filterTable() {
            let input = document.getElementById("gigSearch").value.toUpperCase();
            let tr = document.getElementById("gigTable").getElementsByTagName("tr");
            for (let i = 1; i < tr.length; i++) {
                tr[i].style.display = tr[i].innerText.toUpperCase().includes(input) ? "" : "none";
            }
        }
    </script>
</body>
</html>
