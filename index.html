<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dublin Gigs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #dcdcdc; /* Base grey background */
            color: #333333;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #b71c1c; /* Deep red */
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }
        table {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            border-collapse: collapse;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #bcbcbc;
        }
        th {
            background-color: #b71c1c; /* Red header */
            color: #ffffff; /* White text */
            text-transform: uppercase;
            font-size: 0.9em;
        }
        /* Alternating shades of grey for the rows */
        tr:nth-child(even) {
            background-color: #e0e0e0; 
        }
        tr:nth-child(odd) {
            background-color: #f5f5f5;
        }
        .status-available {
            color: #2e7d32; /* Green for available */
            font-weight: bold;
        }
        .status-soldout {
            color: #b71c1c; /* Red for sold out */
            font-weight: bold;
        }
        .status-na {
            color: #777777; /* Grey for N/A */
        }
    </style>
</head>
<body>

    <h1>Dublin Gigs</h1>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Band/Act</th>
                <th>Venue</th>
                <th>Genre</th>
                <th>Price</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="gigs-body">
            </tbody>
    </table>

    <script>
        // Fetch the JSON file generated by our Python scraper
        fetch('gigs.json')
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('gigs-body');
                
                // Sort the data chronologically by date
                data.sort((a, b) => new Date(a.date) - new Date(b.date));

                data.forEach(gig => {
                    const tr = document.createElement('tr');
                    
                    // Format the date to look nice (e.g., Wed, Apr 15, 2026)
                    const dateObj = new Date(gig.date);
                    const dateStr = dateObj.toLocaleDateString('en-IE', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });

                    // Determine what color the status text should be
                    let statusClass = 'status-na';
                    let statusText = gig.status || 'N/A';
                    if (statusText.toLowerCase().includes('available')) statusClass = 'status-available';
                    if (statusText.toLowerCase().includes('sold out')) statusClass = 'status-soldout';

                    // Create the row
                    tr.innerHTML = `
                        <td>${dateStr}</td>
                        <td><strong>${gig.act}</strong></td>
                        <td>${gig.venue}</td>
                        <td>${gig.genre || 'N/A'}</td>
                        <td>${gig.price || 'Free'}</td>
                        <td class="${statusClass}">${statusText}</td>
                    `;
                    tbody.appendChild(tr);
                });
            })
            .catch(error => {
                console.error('Error loading gigs:', error);
                document.getElementById('gigs-body').innerHTML = '<tr><td colspan="6" style="text-align:center;">Loading gigs... (or data file missing)</td></tr>';
            });
    </script>
</body>
</html>
